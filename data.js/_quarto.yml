project:
  type: website
  title: "data.js Documentation"
  execute-dir: project
  output-dir: docs
  render:
      - index.qmd
      - getting_started.qmd
      - loading_data.qmd
      - remote_parquet_bbox.qmd
      - transforming_tables.qmd
      - combining_sources.qmd
      - api_reference.qmd
      - source_types.qmd
      - examples.qmd
      - troubleshooting.qmd
      - about.qmd

website:
  title: "data.js Documentation"
  site-url: "https://gjrichter.github.io/docs/data.js/docs/"
  repo-url: https://github.com/gjrichter/data.js
  repo-actions: [issue]
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - href: getting_started.qmd
        text: Quick Start
      - href: api_reference.qmd
        text: API
    right:
      - icon: github
        href: https://github.com/gjrichter/data.js
  sidebar:
    style: "docked"
    background: light
    search: true
    contents:
      - text: "Overview"
        href: index.qmd
      - text: "---"
      - section: "Getting Started"
        contents:
          - href: getting_started.qmd
            text: "Quick Start"
      - text: "---"
      - section: "Guides"
        contents:
          - href: loading_data.qmd
            text: "Loading Data"
          - href: remote_parquet_bbox.qmd
            text: "Remote Parquet by Bounding Box"
          - href: transforming_tables.qmd
            text: "Transforming Tables"
          - href: combining_sources.qmd
            text: "Combining Sources"
      - text: "---"
      - section: "Reference"
        contents:
          - href: api_reference.qmd
            text: "API Reference"
          - href: source_types.qmd
            text: "Source Types"
      - text: "---"
      - href: examples.qmd
        text: "Examples"
      - text: "---"
      - href: troubleshooting.qmd
        text: "Troubleshooting"
      - text: "---"
      - href: about.qmd
        text: "About"
  page-navigation: true

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    canonical-url: true

callout-appearance: simple
